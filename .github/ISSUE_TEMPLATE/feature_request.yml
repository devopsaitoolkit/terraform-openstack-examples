name: "💡 Feature request (tooling / repo)"
description: Suggest an improvement to scripts, CI, docs, or repo structure.
title: "[feature] <short description>"
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
    validations: { required: true }
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
